<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Debate System</title>
  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body { background: #f0f2f5; }

    #chat-box {
      height: 58vh;
      overflow-y: auto;
      background: #fff;
      border-radius: .75rem;
      padding: 1.25rem;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 72%;
      border-radius: 1rem;
      padding: .65rem 1rem;
      font-size: .93rem;
      line-height: 1.45;
      margin-bottom: .65rem;
    }

    .bubble-pro   { background: #d1e7ff; margin-left: auto; border-bottom-right-radius: .2rem; }
    .bubble-con   { background: #f8d7da; margin-right: auto; border-bottom-left-radius: .2rem; }
    .bubble-father{ background: #e2e3e5; margin: .4rem auto; font-style: italic; }

    .label-badge {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .04em;
      margin-bottom: .2rem;
    }

    #spinner { display: none; }

    .verdict-card { border-left: 5px solid #0d6efd; }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:780px;">

  <!-- Header -->
  <div class="text-center mb-4">
    <h1 class="fw-bold">AI Debate System</h1>
    <p class="text-muted">Multi-agent debate powered by Claude — Group NajAmjad</p>
  </div>

  <!-- Topic form -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <form id="debate-form">
        <div class="input-group">
          <input
            id="topic-input"
            type="text"
            class="form-control form-control-lg"
            placeholder="Enter a debate topic…"
            required
            maxlength="300"
          />
          <button class="btn btn-primary btn-lg px-4" type="submit">Debate</button>
        </div>
        <div class="form-text mt-1">Example: "Remote work is better than office work"</div>
      </form>
    </div>
  </div>

  <!-- Spinner -->
  <div id="spinner" class="text-center my-3">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 text-muted small">Running debate — this may take a few minutes…</div>
  </div>

  <!-- Chat box -->
  <div id="chat-box" class="shadow-sm mb-3"></div>

  <!-- Verdict card (hidden until debate ends) -->
  <div id="verdict-card" class="card shadow-sm verdict-card mb-3" style="display:none;">
    <div class="card-header fw-bold">Verdict</div>
    <div class="card-body">
      <p class="mb-1"><strong>Winner:</strong> <span id="v-winner"></span></p>
      <p class="mb-1"><strong>Turns:</strong> <span id="v-turns"></span></p>
      <p class="mb-0"><strong>Reasoning:</strong> <span id="v-reasoning"></span></p>
    </div>
  </div>

  <!-- Cost card (hidden until debate ends) -->
  <div id="cost-card" class="card shadow-sm mb-3 text-muted small" style="display:none;">
    <div class="card-body">
      Cost: $<span id="c-total"></span>
      &nbsp;|&nbsp; Budget utilisation: <span id="c-pct"></span>%
    </div>
  </div>

</div><!-- /container -->

<!-- Bootstrap JS bundle -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jyor3NBAIsDfwg8r8RXW0ECGXVgQo"
  crossorigin="anonymous"
></script>
<!-- jQuery -->
<script
  src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous"
></script>

<script>
/* ------------------------------------------------------------------ */
/*  Sender helper                                                       */
/* ------------------------------------------------------------------ */
function senderClass(sender) {
  if (sender === 'pro_son')  return 'bubble-pro';
  if (sender === 'con_son')  return 'bubble-con';
  return 'bubble-father';
}

function senderLabel(sender) {
  if (sender === 'pro_son')  return 'PRO';
  if (sender === 'con_son')  return 'CON';
  return 'FATHER';
}

function winnerLabel(w) {
  return w === 'pro_son' ? 'Pro Son' : 'Con Son';
}

/* ------------------------------------------------------------------ */
/*  Append a single chat bubble                                         */
/* ------------------------------------------------------------------ */
function appendBubble(msg) {
  var cls   = senderClass(msg.sender);
  var label = senderLabel(msg.sender);
  var src   = (msg.sources && msg.sources.length)
              ? '<div class="small text-muted mt-1">' +
                msg.sources.slice(0,2).map(function(s){
                  return '<a href="' + s + '" target="_blank" rel="noopener">'
                       + s.substring(0, 50) + '…</a>';
                }).join(' ') + '</div>'
              : '';

  var html = '<div class="d-flex flex-column '
           + (msg.sender === 'pro_son' ? 'align-items-end' : 'align-items-start') + '">'
           + '<div class="label-badge text-muted">' + label + '</div>'
           + '<div class="bubble ' + cls + '">'
           + $('<div>').text(msg.content).html()
           + src
           + '</div></div>';

  $('#chat-box').append(html);
  var box = document.getElementById('chat-box');
  box.scrollTop = box.scrollHeight;
}

/* ------------------------------------------------------------------ */
/*  Form submit                                                         */
/* ------------------------------------------------------------------ */
$('#debate-form').on('submit', function(e) {
  e.preventDefault();

  var topic = $('#topic-input').val().trim();
  if (!topic) return;

  /* reset UI */
  $('#chat-box').empty();
  $('#verdict-card, #cost-card').hide();
  $('#spinner').show();
  $('button[type=submit]').prop('disabled', true);

  $.ajax({
    url: '/api/debate',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ topic: topic }),
    success: function(data) {
      /* render transcript */
      $.each(data.transcript, function(_, msg) { appendBubble(msg); });

      /* verdict */
      $('#v-winner').text(winnerLabel(data.verdict.winner));
      $('#v-turns').text(data.verdict.turn_count);
      $('#v-reasoning').text(data.verdict.reasoning);
      $('#verdict-card').show();

      /* cost */
      $('#c-total').text(data.cost.total_usd.toFixed(4));
      $('#c-pct').text(data.cost.utilisation_pct.toFixed(1));
      $('#cost-card').show();
    },
    error: function(xhr) {
      var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Debate failed.';
      $('#chat-box').append(
        '<div class="alert alert-danger">' + $('<div>').text(msg).html() + '</div>'
      );
    },
    complete: function() {
      $('#spinner').hide();
      $('button[type=submit]').prop('disabled', false);
    }
  });
});
</script>
</body>
</html>
